[phases.install]
cmds = ["composer install --no-dev --no-interaction --optimize-autoloader", "npm install", "npm run build"]

[start]
cmd = "if [ \"$RAILWAY_SERVICE_NAME\" = \"worker\" ]; then php artisan schedule:work & php artisan queue:work --queue=telegram --tries=3 --timeout=30; else php artisan migrate --force && (php artisan telegram:set-webhook || true) && php artisan config:cache && php artisan route:cache && php artisan view:cache && php -S 0.0.0.0:$PORT -t public; fi"
